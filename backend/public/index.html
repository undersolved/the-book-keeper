<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>Book Store</title>

		<script src="https://cdn.tailwindcss.com"></script>
	</head>

	<body class="bg-stone-100">
		<nav class="bg-white shadow-md">
			<div class="max-w-7xl mx-auto p-5 flex justify-between">
				<h1 class="text-3xl font-bold">📚 Book Store</h1>

				<button class="bg-black text-white px-5 py-2 rounded-lg">
					My Library
				</button>
			</div>
		</nav>

		<section class="max-w-7xl mx-auto mt-10">
			<input
				id="search"
				type="text"
				placeholder="Search books..."
				class="w-full p-4 rounded-xl border" />
		</section>
		<section class="max-w-7xl mx-auto mt-10">
			<div id="booksContainer" class="grid grid-cols-4 gap-6"></div>
		</section>
        
		<script src="./js/ui.js"></script>

		<script src="./js/api.js"></script>

		<script src="./js/home.js"></script>
	</body>
</html>
