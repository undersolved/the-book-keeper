<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />

		<meta name="viewport" content="width=device-width, initial-scale=1.0" />

		<title>📚 Book Store</title>

		<script src="https://cdn.tailwindcss.com"></script>

		<style>
			html {
				scroll-behavior: smooth;
			}
		</style>
	</head>

	<body class="bg-stone-100 text-gray-900 min-h-screen">
		<!-- ===================== NAVBAR ===================== -->

		<nav class="bg-white border-b shadow-sm sticky top-0 z-50">
			<div
				class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
				<h1 class="text-3xl font-bold tracking-wide">📚 Book Store</h1>

				<button
					class="bg-black text-white px-6 py-3 rounded-xl hover:bg-gray-800 transition duration-300">
					My Library
				</button>
			</div>
		</nav>

		<!-- ===================== HERO ===================== -->

		<section class="max-w-7xl mx-auto px-6 py-20 text-center">
			<h2 class="text-4xl md:text-5xl font-bold leading-tight">
				Discover Your Next Favorite Book
			</h2>

			<p class="mt-6 text-lg text-gray-500">
				Browse, manage and build your personal book collection.
			</p>
		</section>

		<!-- ================= ADD BOOK ================= -->

		<section class="max-w-4xl mx-auto px-6">
			<div class="bg-white rounded-2xl shadow-md p-8">
				<h2 class="text-2xl font-bold mb-6">➕ Add New Book</h2>

				<form id="bookForm" class="grid md:grid-cols-2 gap-5">
					<input
						id="title"
						type="text"
						placeholder="Book Title"
						class="border rounded-xl p-4"
						required />

					<input
						id="author"
						type="text"
						placeholder="Author"
						class="border rounded-xl p-4"
						required />

					<input
						id="genre"
						type="text"
						placeholder="Genre"
						class="border rounded-xl p-4"
						required />

					<input
						id="price"
						type="number"
						placeholder="Price"
						class="border rounded-xl p-4"
						required />

					<button
						class="md:col-span-2 bg-black text-white rounded-xl py-4 hover:bg-gray-800 transition">
						Add Book
					</button>
				</form>
			</div>
		</section>

		<!-- ===================== SEARCH ===================== -->

		<section class="max-w-3xl mx-auto px-6">
			<div class="relative">
				<span
					class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">
					🔍
				</span>

				<input
					id="search"
					type="text"
					placeholder="Search books..."
					class="w-full rounded-xl border border-gray-300 bg-white p-4 pl-12 shadow-sm focus:outline-none focus:ring-2 focus:ring-black transition" />
			</div>
		</section>

		<!-- ===================== BOOK GRID ===================== -->

		<section class="max-w-7xl mx-auto px-6 py-16">
			<div
				id="booksContainer"
				class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
				<p class="col-span-full text-center text-gray-500 text-lg">
					Loading books...
				</p>
			</div>
		</section>

		<!-- ===================== SCRIPTS ===================== -->

		<script src="./js/api.js"></script>
		<script src="./js/ui.js"></script>
		<script src="./js/home.js"></script>
	</body>
</html>
